live_config_reload = true

import = [ "~/AppData/Roaming/alacritty/poimandres.toml" ]

[[keyboard.bindings]]
chars = "\u0000"
key = "Space"
mods = "Control"

[env]
TERM = "xterm-256color"

[font]
size = 14

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "none"
