[[keyboard.bindings]]
chars = "\u0000"
key = "Space"
mods = "Control"

[env]
TERM = "xterm-256color"

[font]
size = 14

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "none"

[general]
live_config_reload = true

import = ["themes/rose_pine.toml"]

