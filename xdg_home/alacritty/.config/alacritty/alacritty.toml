[[keyboard.bindings]]
chars = "\u0000"
key = "Space"
mods = "Control"

[env]
TERM = "xterm-256color"

[font]
size = 14.5

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "none"

[window.padding]
x = 0
y = 0

[general]
live_config_reload = true

import = ["./themes/vague_1.toml"]
